# csm-challenge integration v2 -- managed by CSM, do not edit
# Apply with `csm webserver-integration install`.
# Refresh with `csm webserver-integration upgrade` after CSM upgrades.

RewriteEngine On
RewriteMap csm_chal "txt:{{ .ChallengeMapPath }}"

# When a source IP is on the challenge list AND the request isn't
# already heading to the challenge endpoint, redirect to the
# reverse-proxy entry point on the same vhost. The browser keeps
# talking to the customer cert; CSM never touches public TLS.
RewriteCond ${csm_chal:%{REMOTE_ADDR}} =challenge
RewriteCond %{REQUEST_URI} !^/__csm_challenge
RewriteRule ^/(.*)$ /__csm_challenge?dest=%{REQUEST_URI} [R=302,L]

# Reverse-proxy /__csm_challenge to the challenge listener.
# CSM speaks plain HTTP on {{ .BackendHostPort }}; the webserver terminates
# TLS for the visitor with the vhost's existing cert.
# Configure challenge.trusted_proxies with loopback so CSM trusts the
# X-Forwarded-For header added by mod_proxy.
<Location /__csm_challenge>
    ProxyPass        {{ .BackendURL }} nocanon
    ProxyPassReverse {{ .BackendURL }}
</Location>
