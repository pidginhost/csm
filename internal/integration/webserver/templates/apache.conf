# csm-challenge integration v4 -- managed by CSM, do not edit
# Apply with `csm webserver-integration install`.
# Refresh with `csm webserver-integration upgrade` after CSM upgrades.
#
# When a source IP is on the challenge list, redirect every request to
# the CSM challenge listener at challenge.public_url. The listener is
# served by CSM directly on a TLS-valid host:port the operator
# already controls (typically the cPanel admin domain on a CSM-owned
# port). No per-vhost proxy or mod_proxy setup is required; this
# snippet emits only the server-scope rewrite.

RewriteEngine On
RewriteMap csm_chal "txt:{{ .ChallengeMapPath }}"

RewriteCond ${csm_chal:%{REMOTE_ADDR}} =challenge
RewriteRule ^/(.*)$ {{ .ChallengePublicURL }}?dest=%{REQUEST_SCHEME}://%{HTTP_HOST}/$1 [R=302,L]
