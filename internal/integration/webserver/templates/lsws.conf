# csm-challenge integration v4 -- managed by CSM, do not edit
# Apply with `csm webserver-integration install`.
#
# LSWS notes:
#   - LSWS reads cPanel's Apache config tree (loadApacheConf=1) so this
#     file is picked up at server scope.
#   - RewriteMap + RewriteCond + RewriteRule at server scope ARE
#     honored by LSWS's Apache emulation.
#   - The redirect target is a fully-qualified URL, so no LSWS proxy
#     worker (External App) is needed. The browser navigates to the
#     CSM challenge listener directly using its own DNS + TLS.

RewriteEngine On
RewriteMap csm_chal "txt:{{ .ChallengeMapPath }}"

RewriteCond ${csm_chal:%{REMOTE_ADDR}} =challenge
RewriteRule ^/(.*)$ {{ .ChallengePublicURL }}?dest=%{REQUEST_SCHEME}://%{HTTP_HOST}/$1 [R=302,L]
