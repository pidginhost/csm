# csm-challenge integration v3 -- managed by CSM, do not edit
# Apply with `csm webserver-integration install`.
#
# LSWS notes:
#   - LSWS reads cPanel's Apache config tree (loadApacheConf=1) so this
#     file is picked up at server scope.
#   - RewriteMap, RewriteCond, RewriteRule at server scope ARE honored
#     by LSWS's Apache emulation.
#   - <Location> + ProxyPass at server scope are NOT honored. The
#     proxy hand-off uses LSWS's native worker via the [P] flag and
#     a named External App.
#
# One-time operator setup (LSWS WebAdmin Console):
#   Server -> External App -> Add -> Type: Web Server
#     Name:                     csm_challenge
#     Address:                  {{ .BackendHostPort }}
#     Max Connections:          100
#     Initial Request Timeout:  60
#     Retry Timeout:            0
#     Persistent Connection:    Yes
#     Response Buffering:       No
#   Graceful Restart.
#
# Configure challenge.trusted_proxies with loopback so CSM trusts the
# X-Forwarded-For header added by the LSWS worker.

RewriteEngine On
RewriteMap csm_chal "txt:{{ .ChallengeMapPath }}"

# Source IP on the challenge list -> redirect to the challenge URL.
RewriteCond ${csm_chal:%{REMOTE_ADDR}} =challenge
RewriteCond %{REQUEST_URI} !^/__csm_challenge
RewriteRule ^/(.*)$ /__csm_challenge?dest=%{REQUEST_URI} [R=302,L]

# Proxy /__csm_challenge to the LSWS External App named "csm_challenge".
# The hostname here is not a DNS name; LSWS resolves it to the worker
# defined via WebAdmin Console.
RewriteRule ^/__csm_challenge(.*)$ http://csm_challenge/challenge$1 [P,L]
