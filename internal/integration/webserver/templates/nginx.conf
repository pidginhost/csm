# csm-challenge integration v2 -- managed by CSM, do not edit
# Apply with `csm webserver-integration install`.
# Refresh with `csm webserver-integration upgrade` after CSM upgrades.
#
# Nginx cannot apply an http{} drop-in to every existing server{} safely.
# This file supplies the shared upstream. Each server{} that should be
# gated must include the auth_request block below.
# Configure challenge.trusted_proxies with loopback so CSM trusts the
# X-Forwarded-For header supplied by nginx.
#
# Operators who want this site-wide can add the block to a shared
# /etc/nginx/conf.d/csm-challenge-vhost.inc and include it from every
# server{} they want gated.

