# csm-challenge integration v1 -- managed by CSM, do not edit
# Apply with `csm webserver-integration install`.
# Refresh with `csm webserver-integration upgrade` after CSM upgrades.
#
# Nginx has no built-in equivalent of Apache's RewriteMap that re-reads
# a text file per request. CSM produces /opt/csm/state/challenge_ips.nginx.map
# with one "ip 1;" entry per challenge-listed IP and reloads nginx when the
# entry set changes (debounced). The map block below pulls the file in;
# every server{} that opts in adds the if-block below.
#
# Operators who want this site-wide can add the if-block to a shared
# /etc/nginx/conf.d/csm-challenge-vhost.inc and include it from every
# server{} they want gated.

map $remote_addr $csm_challenged {
    default       0;
    include       /opt/csm/state/challenge_ips.nginx.map;
}

# Each server{} that should be gated needs:
#
#     if ($csm_challenged) {
#         set $csm_dest $request_uri;
#         rewrite ^ /__csm_challenge?dest=$csm_dest last;
#     }
#     location /__csm_challenge {
#         proxy_pass http://127.0.0.1:8439/challenge;
#         proxy_set_header Host $host;
#         proxy_set_header X-Real-IP $remote_addr;
#     }
#
# CSM ships the location block here as a globally-defined named location
# so operators only need the `if` block in each gated server.

upstream csm_challenge_backend {
    server 127.0.0.1:8439;
    keepalive 4;
}
