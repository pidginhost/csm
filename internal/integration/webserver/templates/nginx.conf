# csm-challenge integration v4 -- managed by CSM, do not edit
# Apply with `csm webserver-integration install`.
# Refresh with `csm webserver-integration upgrade` after CSM upgrades.
#
# Nginx cannot apply an http{} drop-in to every existing server{}
# safely, so this file provides the shared map. Each server{} that
# should be gated includes the documented one-line if-block below.
# The redirect target is a fully-qualified URL pointing at CSM's own
# challenge listener, so no proxy hand-off lives here.

map $remote_addr $csm_challenged {
    default       0;
    include       {{ .ChallengeNginxMapPath }};
}

# Per-server include:
#
#   server {
#       ...
#       if ($csm_challenged) {
#           return 302 {{ .ChallengePublicURL }}?dest=$scheme://$host$request_uri;
#       }
#   }
#
# CSM regenerates challenge_ips.nginx.map on every IPList change and
# triggers `nginx -s reload` only when the entry set changes, so live
# traffic does not eat a reload per challenge add.
