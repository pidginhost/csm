# CSM Security Monitor — WHM AppConfig registration file.
#
# Deployed to /var/cpanel/apps/csm.conf by the daemon at startup and
# registered with WHM via /usr/local/cpanel/bin/register_appconfig.
# WHM reads registered AppConfig entries to build the sidebar menu
# under "Plugins".
#
# Schema reference:
#   https://api.docs.cpanel.net/guides/guide-to-whm-plugins/guide-to-whm-plugins-appconfig-registration-file/
#
# Keys (all required unless noted):
#   service     — "whostmgr" for WHM plugins
#   displayname — Human-readable label shown in the sidebar
#   acls        — ACLs allowed to see the plugin ("all" = every reseller)
#   url         — Absolute path under the WHM docroot
#   entryurl    — Relative CGI path (filename only)
#   user        — UID the CGI runs as ("root" for privileged plugins)
#   target      — Link target ("_self" keeps navigation in the main frame)
#   name        — Unique identifier, placed at the end of the file

service=whostmgr
displayname=CSM Security Monitor
acls=all
url=/cgi/addon_csm.cgi
entryurl=addon_csm.cgi
user=root
target=_self

name=csm
