# Curated known-vulnerable WordPress plugin feed (seed set).
#
# A `vulnerable_plugins` finding fires only when an installed plugin's version is
# BELOW `fixed_in` (and, when set, at/above `min_affected`). Installs at or above
# `fixed_in` stay silent -- a patched copy of the same plugin must never alert.
#
# Seeded from CISA-KEV WordPress entries and versions confirmed on production
# cPanel hosts. This is a conservative seed, not an exhaustive database: only add
# entries whose vulnerable version range is well established, so the detector
# never fires on a version that is not actually affected.
plugins:
  - slug: ultimate-member
    cve: CVE-2023-3460
    title: "Unauthenticated privilege escalation to administrator"
    fixed_in: "2.6.7"
    kev: true
    severity: critical
    reference: "https://nvd.nist.gov/vuln/detail/CVE-2023-3460"

  - slug: duplicator
    cve: CVE-2020-11738
    title: "Unauthenticated directory traversal / arbitrary file download (retrieves wp-config.php)"
    fixed_in: "1.3.28"
    kev: false
    severity: critical
    reference: "https://nvd.nist.gov/vuln/detail/CVE-2020-11738"

  - slug: wp-statistics
    cve: CVE-2021-24340
    title: "Unauthenticated blind SQL injection"
    fixed_in: "13.0.8"
    kev: false
    severity: critical
    reference: "https://nvd.nist.gov/vuln/detail/CVE-2021-24340"

  - slug: wp-file-manager
    cve: CVE-2020-25213
    title: "Unauthenticated remote code execution via arbitrary file upload"
    fixed_in: "6.9"
    min_affected: "6.0"
    kev: true
    severity: critical
    reference: "https://nvd.nist.gov/vuln/detail/CVE-2020-25213"
