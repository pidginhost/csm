<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CSM — Blocked IPs</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <meta name="csrf-token" content="{{csrfToken}}">
</head>
<body>
    <header>
        <div class="container">
            <h1><span>CSM</span> Security Monitor</h1>
            <nav>
                <a href="/dashboard">Dashboard</a>
                <a href="/findings">Findings</a>
                <a href="/history">History</a>
                <a href="/quarantine">Quarantine</a>
                <a href="/blocked" class="active">Blocked IPs</a>
            </nav>
        </div>
    </header>
    <main>
        <div class="container">
            <h2 style="margin-bottom:1rem">Blocked IPs</h2>

            <div class="card" style="margin-bottom:1rem;padding:1rem">
                <form id="block-form" style="display:flex;gap:0.5rem;align-items:center">
                    <input type="text" id="block-ip" placeholder="IP address" style="flex:1;padding:0.5rem;background:var(--bg-input);border:1px solid var(--border);border-radius:4px;color:var(--text)">
                    <input type="text" id="block-reason" placeholder="Reason (optional)" style="flex:2;padding:0.5rem;background:var(--bg-input);border:1px solid var(--border);border-radius:4px;color:var(--text)">
                    <button type="submit" style="padding:0.5rem 1rem;background:var(--critical);color:#fff;border:none;border-radius:4px;cursor:pointer">Block IP</button>
                </form>
                <div id="block-status" style="margin-top:0.5rem;font-size:0.85rem"></div>
            </div>

            <div id="blocked-table">
                <div class="empty-state">Loading...</div>
            </div>
        </div>
    </main>
    <footer>
        <div class="container">CSM — cPanel Security Monitor | {{.Hostname}}</div>
    </footer>
    <script src="/static/js/csrf.js"></script>
    <script>
    function loadBlocked() {
        fetch('/api/v1/blocked-ips', {credentials:'same-origin'})
            .then(function(r){return r.json()})
            .then(function(ips){
                var el = document.getElementById('blocked-table');
                if (!ips || ips.length === 0) {
                    el.innerHTML = '<div class="empty-state">No blocked IPs.</div>';
                    return;
                }
                var html = '<table><thead><tr><th>IP</th><th>Reason</th><th>Blocked</th><th>Expires In</th><th>Action</th></tr></thead><tbody>';
                for (var i = 0; i < ips.length; i++) {
                    var ip = ips[i];
                    html += '<tr><td class="mono">' + esc(ip.ip) + '</td><td>' + esc(ip.reason) + '</td><td class="mono">' + esc(ip.blocked_at) + '</td><td>' + esc(ip.expires_in) + '</td><td><button onclick="unblockIP(\'' + esc(ip.ip) + '\')" style="padding:0.3rem 0.6rem;background:var(--success);color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:0.8rem">Unblock</button></td></tr>';
                }
                html += '</tbody></table>';
                el.innerHTML = html;
            })
            .catch(function(){ document.getElementById('blocked-table').innerHTML = '<div class="empty-state">Error loading data.</div>'; });
    }

    function unblockIP(ip) {
        if (!confirm('Unblock ' + ip + '?')) return;
        CSM.post('/api/v1/unblock-ip', {ip: ip}).then(function(data){
            showStatus(data.error || 'Unblocked: ' + ip, !data.error);
            loadBlocked();
        }).catch(function(e){ showStatus('Error: ' + e, false); });
    }

    document.getElementById('block-form').addEventListener('submit', function(e) {
        e.preventDefault();
        var ip = document.getElementById('block-ip').value.trim();
        var reason = document.getElementById('block-reason').value.trim() || 'Blocked via CSM Web UI';
        if (!ip) return;
        if (!confirm('Block IP ' + ip + '?')) return;
        CSM.post('/api/v1/block-ip', {ip: ip, reason: reason}).then(function(data){
            showStatus(data.error || 'Blocked: ' + ip, !data.error);
            document.getElementById('block-ip').value = '';
            document.getElementById('block-reason').value = '';
            loadBlocked();
        }).catch(function(e){ showStatus('Error: ' + e, false); });
    });

    function showStatus(msg, ok) {
        var el = document.getElementById('block-status');
        el.textContent = msg;
        el.style.color = ok ? 'var(--success)' : 'var(--critical)';
        setTimeout(function(){ el.textContent = ''; }, 5000);
    }
    function esc(s){var d=document.createElement('div');d.appendChild(document.createTextNode(s||''));return d.innerHTML;}

    loadBlocked();
    </script>
</body>
</html>
