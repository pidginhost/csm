name: csm
arch: "${ARCH}"
version: "${VERSION}"
maintainer: "PidginHost <support@pidginhost.com>"
description: "Continuous Security Monitor - real-time server security for cPanel/WHM"
homepage: "https://github.com/pidginhost/csm"
license: "AGPL-3.0-or-later"
vendor: "PidginHost"

depends:
  - systemd
recommends:
  - audit
  - logrotate

contents:
  - src: dist/csm-linux-${ARCH}
    dst: /opt/csm/csm
    file_info:
      mode: 0700
      owner: root
      group: root

  - src: /opt/csm/csm
    dst: /usr/sbin/csm
    type: symlink

  # Upgrade helper script. Users run /opt/csm/deploy.sh upgrade to fetch
  # the latest release from GitHub. Shipped via the package so fresh
  # installs always have a working upgrade path.
  - src: scripts/deploy.sh
    dst: /opt/csm/deploy.sh
    file_info:
      mode: 0755
      owner: root
      group: root

  - src: build/packaging/csm.yaml.default
    dst: /etc/csm/csm.yaml
    type: config|noreplace
    file_info:
      mode: 0600
      owner: root
      group: root

  - src: build/packaging/systemd/csm.service
    dst: /etc/systemd/system/csm.service

  - src: configs/logrotate.conf
    dst: /etc/logrotate.d/csm
    type: config|noreplace

  - src: build/packaging/csm.audit.rules
    dst: /etc/audit/rules.d/csm.rules
    file_info:
      mode: 0640

  - src: ui/templates/*
    dst: /opt/csm/ui/templates/
  - src: ui/static/js/*
    dst: /opt/csm/ui/static/js/
  - src: ui/static/css/*.css
    dst: /opt/csm/ui/static/css/
  - src: ui/static/css/fonts/*
    dst: /opt/csm/ui/static/css/fonts/

  - src: configs/*
    dst: /opt/csm/configs/
  - src: configs/whm/*
    dst: /opt/csm/configs/whm/

  - src: configs/malware.yml
    dst: /opt/csm/rules/malware.yml
  - src: configs/malware.yar
    dst: /opt/csm/rules/malware.yar

  # FHS layout: /etc/csm for config, /var/lib/csm for state, /usr/lib/csm for shipped assets.
  - dst: /etc/csm
    type: dir
    file_info:
      mode: 0750
  - dst: /etc/csm/conf.d
    type: dir
    file_info:
      mode: 0750
  - dst: /var/lib/csm
    type: dir
    file_info:
      mode: 0700
  - dst: /var/lib/csm/state
    type: dir
    file_info:
      mode: 0700
  - dst: /usr/lib/csm
    type: dir
    file_info:
      mode: 0755
  - dst: /usr/lib/csm/profiles
    type: dir
    file_info:
      mode: 0755
  - src: build/packaging/profiles/phpanel-agent.yaml
    dst: /usr/lib/csm/profiles/phpanel-agent.yaml
    file_info:
      mode: 0644
  - src: build/packaging/profiles/yara-forge.example.yaml
    dst: /usr/lib/csm/profiles/yara-forge.example.yaml
    file_info:
      mode: 0644
  - src: build/packaging/examples/csm-prestart.example.conf
    dst: /usr/lib/csm/profiles/csm-prestart.example.conf
    file_info:
      mode: 0644

  # PAM module staging. The package drops the compiled pam_csm.so under
  # /usr/lib/csm/pam/ so `csm pam install` can copy it into the platform
  # security dir without the operator running gcc on a production host.
  - dst: /usr/lib/csm/pam
    type: dir
    file_info:
      mode: 0755
  - src: dist/pam_csm.so
    dst: /usr/lib/csm/pam/pam_csm.so
    file_info:
      mode: 0755
  - src: build/pam/pam_csm.c
    dst: /usr/lib/csm/pam/pam_csm.c
    file_info:
      mode: 0644
  - src: build/pam/Makefile
    dst: /usr/lib/csm/pam/Makefile
    file_info:
      mode: 0644

  # Legacy runtime paths kept on disk for old helper scripts and quarantine.
  - dst: /opt/csm/quarantine
    type: dir
    file_info:
      mode: 0700
  - dst: /opt/csm/policies
    type: dir
    file_info:
      mode: 0700
  - dst: /opt/csm/policies/php_relay
    type: dir
    file_info:
      mode: 0700
  - dst: /var/log/csm
    type: dir
    file_info:
      mode: 0700

scripts:
  preinstall: build/packaging/scripts/preinstall.sh
  postinstall: build/packaging/scripts/postinstall.sh
  preremove: build/packaging/scripts/preremove.sh
  postremove: build/packaging/scripts/postremove.sh

rpm:
  scripts:
    posttrans: build/packaging/scripts/posttrans.sh

overrides:
  rpm:
    depends:
      - systemd
    recommends:
      - audit
      - logrotate
  deb:
    depends:
      - systemd
    recommends:
      - auditd
      - logrotate
