# Drop this file at /etc/systemd/system/csm.service.d/10-prestart.conf
# to run a script BEFORE the CSM daemon starts. Use this for tasks the
# panel agent (or operator) needs to do as root before CSM binds:
#   - reconcile DNS for infra_ips
#   - refresh the panel hostname in conf.d
#   - export an HMAC secret into the environment via EnvironmentFile=
#
# Place the actual hook script wherever you like - convention is
# /opt/<panel-vendor>/<package>/hooks/csm-prestart.sh.
#
# After installing, run:
#     systemctl daemon-reload
#     systemctl restart csm.service

[Service]
# An ExecStartPre that fails will fail the unit; use - prefix to ignore
# non-zero exits. Adjust to your panel's needs.
ExecStartPre=/opt/phpanel/hooks/csm-prestart.sh

# Optional: pull secrets from a file the panel writes (mode 0600 root:root).
EnvironmentFile=-/etc/csm/runtime.env
