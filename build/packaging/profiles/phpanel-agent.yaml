# CSM integration profile for phpanel-server-agent hosts.
#
# Copy or symlink this file to /etc/csm/conf.d/00-phpanel.yaml to apply it.
#
# This profile assumes:
#   - The host is NOT running cPanel/WHM.
#   - Web roots live under /var/www/<domain>/ (not /home/*/public_html).
#   - Mail logs are read from systemd-journald (configured in P4).
#   - phpanel-server-agent owns its own conf.d fragments under /etc/csm/conf.d/
#     and never edits /opt/csm/csm.yaml directly.

# Web account roots. phpanel hosts vhosts under /var/www/<domain>/.
# Add more roots in a higher-numbered conf.d fragment if your layout differs.
account_roots:
  - /var/www/*

# Future schema, kept as comments until P4 wires the journald reader.
#
# mail_logs:
#   source: journal
#   units:
#     - postfix
#     - dovecot

# phpanel-server-agent supplies these via its own fragment (10-phpanel-runtime.yaml).
# Listed here as documentation of what the agent is expected to fill in.
#
# infra_ips:
#   - <panel ip>
#   - <agent control plane ip>

# Webhook + token configuration belongs in the agent's runtime fragment
# (10-phpanel-runtime.yaml). Do not put active placeholder secrets in this
# profile: conf.d sequence merging appends token lists, so placeholders can
# remain valid after a later fragment adds the real token.
#
# alerts:
#   webhook:
#     enabled: true
#     type: phpanel
#     per_finding: true
#     url: https://panel.example.com/api/csm/findings
#     hmac_secret_env: CSM_PHPANEL_HMAC
#
# webui:
#   enabled: true
#   tokens:
#     - name: phpanel-readonly
#       token: <agent-generated-secret>
#       scope: read

# === P4: Mail-stack adaptations ===

# Mail logs read from systemd-journald (no rsyslog dependency on phpanel hosts).
mail_logs:
  source: journal
  units:
    - postfix
    - dovecot

# Per-account brute-force scoring keys on dovecot's user=<...> field by default.
# Operators with custom log formats override this in a higher-numbered fragment.
thresholds:
  mail_brute_account_key: "builtin:dovecot-user"

# Rspamd scoring source. Agent supplies token_env via runtime fragment / env.
reputation:
  rspamd:
    enabled: true
    url: http://127.0.0.1:11334
    # token_env: CSM_RSPAMD_TOKEN  # operator/agent supplies
