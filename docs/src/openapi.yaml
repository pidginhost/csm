# CSM HTTP API -- OpenAPI 3.1 contract for /api/v1/*
#
# Generated from the route registrations in internal/webui. The
# TestOpenAPISpecCoversAllRoutes drift guard fails if a registered
# /api/v1/* route is missing here, so this file stays in sync.
#
# Scope: every operation carries its method and x-csm-scope (read vs admin).
# Method is derived from the route wrapper: CSRF-protected routes are
# state-changing methods, the rest are GETs. Response bodies are typed as
# generic JSON objects in this v1; per-endpoint response schemas are a
# documented follow-up (see ROADMAP item 10, Y16).
openapi: 3.1.0
info:
  title: CSM HTTP API
  version: "1.0"
  description: >-
    Continuous Security Monitor daemon API. API clients authenticate with a
    bearer token from webui.tokens. Read-scope tokens authorize the GET
    endpoints marked x-csm-scope=read; management routes require an
    admin-scope token.
servers:
  - url: https://localhost:9443
    description: CSM daemon HTTPS listener (operator-configured host/port)
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: >-
        webui.tokens entry. scope=read authorizes read endpoints; scope=admin
        authorizes all endpoints.
  responses:
    Unauthorized:
      description: Missing, invalid, or insufficient-scope token.
    Forbidden:
      description: CSRF validation failed or cross-origin API request blocked.
  schemas:
    JSONObject:
      type: object
      description: Endpoint-specific JSON. Per-field schema is a documented follow-up.
      additionalProperties: true
security:
  - bearerAuth: []
paths:
  "/api/v1/account":
    get:
      operationId: get_account
      summary: "get /api/v1/account (scope: admin)"
      x-csm-scope: admin
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JSONObject" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  "/api/v1/accounts":
    get:
