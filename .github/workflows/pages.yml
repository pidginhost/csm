name: Deploy docs and coverage badge to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: '1.26'

      - name: Download coverage profile from latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Coverage is produced by GitLab CI (private), not re-derived on
          # GitHub Actions. The `release:github` stage uploads the GitLab
          # integration stage's merged-coverage.out (unit + Linux integration)
          # as a release asset. We just fetch that artifact; it is already
          # authoritative. Walk recent releases in case the latest one was
          # cut without the integration job completing.
          DEBUG=coverage-debug.txt
          {
            echo "=== Looking for merged-coverage.out in recent releases ==="
            FOUND=""
            for TAG in $(curl -fsSL \
                           -H "Authorization: Bearer $GH_TOKEN" \
                           -H "Accept: application/vnd.github+json" \
                           "https://api.github.com/repos/pidginhost/csm/releases?per_page=10" \
                           | python3 -c "import json,sys; [print(r['tag_name']) for r in json.load(sys.stdin)]"); do
              URL="https://github.com/pidginhost/csm/releases/download/${TAG}/merged-coverage.out"
              if curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
                     -o coverage.out "$URL" 2>/dev/null; then
                FOUND="$TAG"
                echo "  found merged-coverage.out in $TAG"
                break
              fi
              echo "  $TAG: no merged-coverage.out"
            done
            if [ -z "$FOUND" ]; then
              echo ">>> No release carries merged-coverage.out"
              echo "FALLBACK: no coverage" > coverage-source.txt
              exit 1
            fi
            if ! head -1 coverage.out | grep -q '^mode:'; then
              echo ">>> Downloaded profile has no mode header"
              exit 1
            fi
            echo "=== Coverage profile head ==="
            head -3 coverage.out
            echo "=== Coverage profile lines ==="
            wc -l coverage.out
            echo "=== Total ==="
            go tool cover -func=coverage.out 2>&1 | tail -1
            echo "FROM_RELEASE $FOUND" > coverage-source.txt
          } 2>&1 | tee "$DEBUG"

      - name: Generate HTML coverage report
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Generate coverage badge SVG
        run: |
          set -eu
          COV=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%",""); print $3}')
          if [ -z "$COV" ]; then COV="0.0"; fi
          COV_INT=${COV%.*}
          if   [ "$COV_INT" -ge 90 ]; then COLOR="#4c1"
          elif [ "$COV_INT" -ge 80 ]; then COLOR="#97CA00"
          elif [ "$COV_INT" -ge 70 ]; then COLOR="#a4a61d"
          elif [ "$COV_INT" -ge 50 ]; then COLOR="#dfb317"
          else                             COLOR="#e05d44"
          fi
          VALUE="${COV}%"
          LABEL_W=63
          VALUE_W=47
          TOTAL_W=$((LABEL_W + VALUE_W))
          LABEL_X=315
          VALUE_X=865
          cat > coverage.svg <<SVG
          <svg xmlns="http://www.w3.org/2000/svg" width="${TOTAL_W}" height="20" role="img" aria-label="coverage: ${VALUE}">
            <title>coverage: ${VALUE}</title>
            <linearGradient id="s" x2="0" y2="100%">
              <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
              <stop offset="1" stop-opacity=".1"/>
            </linearGradient>
            <clipPath id="r"><rect width="${TOTAL_W}" height="20" rx="3" fill="#fff"/></clipPath>
            <g clip-path="url(#r)">
              <rect width="${LABEL_W}" height="20" fill="#555"/>
              <rect x="${LABEL_W}" width="${VALUE_W}" height="20" fill="${COLOR}"/>
              <rect width="${TOTAL_W}" height="20" fill="url(#s)"/>
            </g>
            <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="110">
              <text transform="scale(.1)" x="${LABEL_X}" y="150" fill="#010101" fill-opacity=".3">coverage</text>
              <text transform="scale(.1)" x="${LABEL_X}" y="140">coverage</text>
              <text transform="scale(.1)" x="${VALUE_X}" y="150" fill="#010101" fill-opacity=".3">${VALUE}</text>
              <text transform="scale(.1)" x="${VALUE_X}" y="140">${VALUE}</text>
            </g>
          </svg>
          SVG
          echo "Generated coverage badge: ${VALUE} (${COLOR})"

      - name: Install mdBook
        run: |
          set -eu
          MDBOOK_VERSION=v0.5.2
          MDBOOK_SHA256=084e4342ba564db270108763e404a7d1f309d932651a22484e93c0dc1a071f6d
          curl -sSL -o mdbook.tar.gz "https://github.com/rust-lang/mdBook/releases/download/${MDBOOK_VERSION}/mdbook-${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          echo "${MDBOOK_SHA256}  mdbook.tar.gz" | sha256sum -c -
          tar xzf mdbook.tar.gz
          sudo mv mdbook /usr/local/bin/
          rm mdbook.tar.gz

      - name: Build docs
        run: cd docs && mdbook build

      - name: Copy coverage assets into Pages artifact
        run: |
          cp coverage.svg docs/book/coverage.svg
          cp coverage.html docs/book/coverage.html
          # Debug file so we can inspect the badge source from the public
          # Pages URL (no admin token needed).
          [ -f coverage-debug.txt ] && cp coverage-debug.txt docs/book/coverage-debug.txt || true
          [ -f coverage-source.txt ] && cp coverage-source.txt docs/book/coverage-source.txt || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: docs/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
