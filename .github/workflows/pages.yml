name: Deploy docs and coverage badge to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run tests with coverage
        run: |
          set -e
          # Scope coverage to internal/ packages -- cmd/csm is package main
          # (CLI glue) and skews the percentage with untestable cobra wiring.
          # -race must match the GitLab `test` job: the race-instrumented
          # build elides some statements that the non-race build counts
          # separately, and without it go tool cover -func reports ~15
          # points lower on the same code. -covermode=atomic is required by
          # -race and matches the integration profile so the two can merge.
          go test -race -timeout=300s -covermode=atomic -coverprofile=coverage.out -coverpkg=./internal/... ./... || true
          go tool cover -func=coverage.out | tail -1

      - name: Merge integration coverage from latest GitHub release
        run: |
          # Write all diagnostic output to a file we can publish on Pages so
          # we can debug from outside (we don't have admin to read Actions logs).
          DEBUG=coverage-debug.txt
          {
            echo "=== UNIT COVERAGE (before merge) ==="
            go tool cover -func=coverage.out 2>&1 | tail -1
            echo "=== Unit profile head ==="
            head -3 coverage.out
            echo "=== Unit profile lines ==="
            wc -l coverage.out

            URL="https://github.com/pidginhost/csm/releases/latest/download/merged-coverage.out"
            echo "=== Fetching $URL ==="
            if ! curl -fsSL -o integration-coverage.out "$URL" 2>&1; then
              echo ">>> FETCH FAILED"
              echo "FALLBACK: unit-only" > coverage-merge-status.txt
              exit 0
            fi
            echo "=== Integration profile head (raw) ==="
            head -3 integration-coverage.out
            echo "=== Integration profile lines (raw) ==="
            wc -l integration-coverage.out

            # Strip cmd/csm entries -- they're 0% coverage CLI glue that
            # was instrumented during the GitLab integration job's pre-merge
            # `go test ./...` step. Including them in the merged profile
            # adds uncovered statements to the denominator and tanks the %.
            grep -v 'github.com/pidginhost/csm/cmd/csm/' integration-coverage.out > integration-coverage.cleaned.out
            mv integration-coverage.cleaned.out integration-coverage.out
            echo "=== Integration profile lines (after cmd/csm strip) ==="
            wc -l integration-coverage.out

            # Use our own tolerant merger (scripts/covmerge). Unlike
            # gocovmerge, it drops per-file entries from the secondary
            # profile when statement ranges don't match (common when the
            # integration profile is from an older tag and the file has
            # been modified since). Primary (unit) coverage is always
            # preserved; matching secondary entries boost hit counts.
            echo "=== Running covmerge (tolerant) ==="
            if ! go run ./scripts/covmerge coverage.out integration-coverage.out >merged.out 2>merge.err; then
              echo ">>> covmerge FAILED:"
              cat merge.err
              echo "FALLBACK: merge failed" > coverage-merge-status.txt
              exit 0
            fi
            echo ">>> covmerge info:"
            cat merge.err
            echo "=== Merged profile head ==="
            head -3 merged.out
            echo "=== Merged profile lines ==="
            wc -l merged.out

            if ! head -1 merged.out | grep -q '^mode:'; then
              echo ">>> Sanity check failed"
              echo "FALLBACK: sanity check failed" > coverage-merge-status.txt
              exit 0
            fi

            mv merged.out coverage.out
            echo "=== MERGED COVERAGE (after merge) ==="
            go tool cover -func=coverage.out 2>&1 | tail -1
            echo "MERGED" > coverage-merge-status.txt
          } 2>&1 | tee "$DEBUG"

      - name: Generate HTML coverage report
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Generate coverage badge SVG
        run: |
          set -eu
          COV=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%",""); print $3}')
          if [ -z "$COV" ]; then COV="0.0"; fi
          COV_INT=${COV%.*}
          if   [ "$COV_INT" -ge 90 ]; then COLOR="#4c1"
          elif [ "$COV_INT" -ge 80 ]; then COLOR="#97CA00"
          elif [ "$COV_INT" -ge 70 ]; then COLOR="#a4a61d"
          elif [ "$COV_INT" -ge 50 ]; then COLOR="#dfb317"
          else                             COLOR="#e05d44"
          fi
          VALUE="${COV}%"
          LABEL_W=63
          VALUE_W=47
          TOTAL_W=$((LABEL_W + VALUE_W))
          LABEL_X=315
          VALUE_X=865
          cat > coverage.svg <<SVG
          <svg xmlns="http://www.w3.org/2000/svg" width="${TOTAL_W}" height="20" role="img" aria-label="coverage: ${VALUE}">
            <title>coverage: ${VALUE}</title>
            <linearGradient id="s" x2="0" y2="100%">
              <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
              <stop offset="1" stop-opacity=".1"/>
            </linearGradient>
            <clipPath id="r"><rect width="${TOTAL_W}" height="20" rx="3" fill="#fff"/></clipPath>
            <g clip-path="url(#r)">
              <rect width="${LABEL_W}" height="20" fill="#555"/>
              <rect x="${LABEL_W}" width="${VALUE_W}" height="20" fill="${COLOR}"/>
              <rect width="${TOTAL_W}" height="20" fill="url(#s)"/>
            </g>
            <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="110">
              <text transform="scale(.1)" x="${LABEL_X}" y="150" fill="#010101" fill-opacity=".3">coverage</text>
              <text transform="scale(.1)" x="${LABEL_X}" y="140">coverage</text>
              <text transform="scale(.1)" x="${VALUE_X}" y="150" fill="#010101" fill-opacity=".3">${VALUE}</text>
              <text transform="scale(.1)" x="${VALUE_X}" y="140">${VALUE}</text>
            </g>
          </svg>
          SVG
          echo "Generated coverage badge: ${VALUE} (${COLOR})"

      - name: Install mdBook
        run: |
          MDBOOK_VERSION=v0.5.2
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/${MDBOOK_VERSION}/mdbook-${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          sudo mv mdbook /usr/local/bin/

      - name: Build docs
        run: cd docs && mdbook build

      - name: Copy coverage assets into Pages artifact
        run: |
          cp coverage.svg docs/book/coverage.svg
          cp coverage.html docs/book/coverage.html
          # Debug files so we can inspect why merge is/isn't working from
          # the public Pages URL (no admin token needed).
          [ -f coverage-debug.txt ] && cp coverage-debug.txt docs/book/coverage-debug.txt || true
          [ -f coverage-merge-status.txt ] && cp coverage-merge-status.txt docs/book/coverage-merge-status.txt || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
