name: CodeQL

# CodeQL static analysis for Go. Runs on push to main, on pull requests
# against main, and on a weekly schedule so newly-disclosed query rules
# find old code. Results land in the repository's Security tab.
#
# Actions pinned by SHA per OpenSSF Scorecard recommendation.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Sundays 04:17 UTC. Staggered off the top of the hour.
    - cron: '17 4 * * 0'

permissions:
  contents: read              # least-privilege default for the workflow

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze Go
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write  # upload SARIF to the Security tab
      actions: read           # read workflow metadata
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          languages: go
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          category: "/language:go"
