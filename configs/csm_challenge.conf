# CSM Challenge Page - Apache Configuration
# Deploy to: /etc/apache2/conf.d/csm_challenge.conf
#
# When nftables blocks an IP but challenge mode is enabled, the firewall
# redirects port 80/443 traffic to the challenge server (port 8439).
# This config adds a fallback for when the redirect is done at the
# application level instead of the firewall level.
#
# To use application-level challenges (without nftables redirect):
# 1. Enable mod_rewrite if not already loaded
# 2. CSM maintains the challenge IP list at /run/csm/challenge_ips.txt
#    while the challenge daemon is running. The daemon creates this file
#    on startup, even when the list is empty.
# 3. RewriteMap reads the list and redirects matching IPs
#
# The RewriteMap txt: path must match the daemon-managed map path. If it
# points at a file nothing writes, Apache/LSWS config validation fails and
# breaks webserver reloads. The <IfModule> guard below only checks that
# mod_rewrite is loaded; it does not make a missing map file safe.
<IfModule mod_rewrite.c>
  RewriteEngine On

  # Check if IP is in challenge list
  RewriteMap csm_challenge "txt:/run/csm/challenge_ips.txt"

  # If IP is in the challenge list, proxy to the local challenge server.
  # Uses [P] (proxy) instead of [R] (redirect) so the client never sees
  # the internal port and the Host header cannot be spoofed for open-redirect.
  # Requires: mod_proxy, mod_proxy_http
  RewriteCond ${csm_challenge:%{REMOTE_ADDR}} =challenge
  RewriteCond %{REQUEST_URI} !^/challenge
  RewriteRule ^(.*)$ http://127.0.0.1:8439/challenge?dest=%{REQUEST_SCHEME}://%{HTTP_HOST}$1 [P,L]
</IfModule>
