# CSM Custom ModSecurity Rules
# Deploy to: /etc/apache2/conf.d/modsec/modsec2.user.conf
# These rules protect against attack patterns observed in production.

# --- Block LEVIATHAN CGI webshell kit access ---
# Blocks requests to .haxor and .cgix extensions (CGI handler abuse)
SecRule REQUEST_URI "\.haxor$|\.cgix$" \
    "id:900001,phase:1,deny,status:403,log,msg:'CSM: Blocked LEVIATHAN CGI extension access'"

# --- Block access to known phishing kit directories ---
SecRule REQUEST_URI "/LEVIATHAN/" \
    "id:900002,phase:1,deny,status:403,log,msg:'CSM: Blocked LEVIATHAN directory access'"

# --- Block PHP execution in wp-content/uploads ---
# PHP files in uploads should never be executed directly
SecRule REQUEST_URI "/wp-content/uploads/.*\.php" \
    "id:900003,phase:1,deny,status:403,log,msg:'CSM: Blocked PHP execution in uploads directory'"

# --- Block PHP execution in wp-content/languages ---
# Languages directory should only serve .mo/.po/.l10n.php translation files
SecRule REQUEST_URI "/wp-content/languages/[^/]*\.php$" \
    "id:900004,phase:1,deny,status:403,log,msg:'CSM: Blocked PHP execution in languages directory',\
    chain"
SecRule REQUEST_URI "!\.l10n\.php$"

# --- Block direct access to wp-config.php ---
SecRule REQUEST_URI "/wp-config\.php" \
    "id:900005,phase:1,deny,status:403,log,msg:'CSM: Blocked direct wp-config.php access'"

# --- Block xmlrpc.php brute force ---
# Rate limit: max 5 POST to xmlrpc.php per 60 seconds per IP
SecRule REQUEST_URI "/xmlrpc\.php$" \
    "id:900006,phase:1,pass,nolog,\
    setvar:ip.xmlrpc_count=+1,\
    expirevar:ip.xmlrpc_count=60"
SecRule IP:XMLRPC_COUNT "@gt 5" \
    "id:900007,phase:1,deny,status:429,log,msg:'CSM: XML-RPC rate limit exceeded',\
    chain"
SecRule REQUEST_URI "/xmlrpc\.php$"

# --- Block common webshell filenames ---
SecRule REQUEST_URI "/(?:c99|r57|wso|alfa|b374k|h4x0r|shell|cmd|backdoor|webshell)\.php$" \
    "id:900008,phase:1,deny,status:403,log,msg:'CSM: Blocked known webshell filename access'"

# --- Block GSocket backdoor User-Agent patterns ---
SecRule REQUEST_HEADERS:User-Agent "(?:gs-netcat|gsocket)" \
    "id:900009,phase:1,deny,status:403,log,msg:'CSM: Blocked GSocket User-Agent'"

# --- Block credential harvesting form submissions ---
# Detects POST to .html files (phishing pages don't normally receive POST)
SecRule REQUEST_METHOD "POST" \
    "id:900010,phase:1,pass,nolog,chain"
SecRule REQUEST_URI "\.html$" \
    "setvar:tx.html_post_count=+1"

# ============================================================
# Virtual Patches — WordPress CVE Protection
# ============================================================
# Auto-deployed by CSM. Blocks exploitation of known WordPress
# vulnerabilities until sites are updated.

# --- CVE-2024-27956: WP-Automatic SQL injection ---
# Unauthenticated SQLi in ValvePress Starter/Starter Templates
SecRule REQUEST_URI "/wp-content/plugins/wp-automatic/" \
    "id:900100,phase:2,deny,status:403,log,msg:'CSM VP: WP-Automatic SQLi (CVE-2024-27956)',\
    chain"
SecRule ARGS|ARGS_NAMES "@rx (?:UNION\s+SELECT|INTO\s+OUTFILE|LOAD_FILE|information_schema)" \
    "t:lowercase"

# --- CVE-2024-2879: LayerSlider SQL injection ---
SecRule REQUEST_URI "/wp-admin/admin-ajax\.php" \
    "id:900101,phase:2,deny,status:403,log,msg:'CSM VP: LayerSlider SQLi (CVE-2024-2879)',\
    chain"
SecRule ARGS:action "ls_get_popup_markup" \
    "chain"
SecRule ARGS "@rx (?:UNION|SELECT|INSERT|UPDATE|DELETE|DROP|information_schema)" \
    "t:lowercase"

# --- CVE-2024-10924: Really Simple Security authentication bypass ---
SecRule REQUEST_URI "/wp-json/reallysimplessl/v1/two_fa/skip_onboarding" \
    "id:900102,phase:1,deny,status:403,log,msg:'CSM VP: Really Simple Security auth bypass (CVE-2024-10924)'"

# --- CVE-2024-4345: LiteSpeed Cache directory traversal ---
SecRule REQUEST_URI "/wp-content/plugins/litespeed-cache/" \
    "id:900103,phase:2,deny,status:403,log,msg:'CSM VP: LiteSpeed Cache directory traversal (CVE-2024-4345)',\
    chain"
SecRule ARGS "@rx \.\./\.\." \
    "t:urlDecode"

# --- CVE-2024-1071: Ultimate Member SQL injection ---
SecRule REQUEST_URI "/wp-admin/admin-ajax\.php" \
    "id:900104,phase:2,deny,status:403,log,msg:'CSM VP: Ultimate Member SQLi (CVE-2024-1071)',\
    chain"
SecRule ARGS:action "um_get_members" \
    "chain"
SecRule ARGS "@rx (?:UNION|ORDER\s+BY.*,.*,|information_schema)" \
    "t:lowercase"

# --- CVE-2023-6553: Backup Migration RCE ---
SecRule REQUEST_URI "/wp-content/plugins/backup-backup/includes/backup-heart\.php" \
    "id:900105,phase:1,deny,status:403,log,msg:'CSM VP: Backup Migration RCE (CVE-2023-6553)'"

# --- CVE-2024-5932: GiveWP PHP object injection ---
SecRule REQUEST_URI "/wp-admin/admin-ajax\.php" \
    "id:900106,phase:2,deny,status:403,log,msg:'CSM VP: GiveWP object injection (CVE-2024-5932)',\
    chain"
SecRule ARGS:action "@rx ^give_" \
    "chain"
SecRule REQUEST_BODY "@rx O:\d+:\"" \
    "t:urlDecode"

# --- CVE-2024-3400: WP File Manager arbitrary upload ---
SecRule REQUEST_URI "/wp-content/plugins/wp-file-manager/lib/php/connector\.minimal\.php" \
    "id:900107,phase:1,deny,status:403,log,msg:'CSM VP: WP File Manager arbitrary upload (CVE-2024-3400)'"

# --- Generic: Block PHP object injection in POST bodies ---
SecRule REQUEST_METHOD "POST" \
    "id:900110,phase:2,deny,status:403,log,msg:'CSM VP: PHP object injection attempt',\
    chain"
SecRule REQUEST_BODY "@rx O:\d+:\"(?:WP_|WordPress|Requests_)" \
    "t:urlDecode"

# --- Generic: Block PHP execution via wp-content/upgrade ---
SecRule REQUEST_URI "/wp-content/upgrade/.*\.php" \
    "id:900111,phase:1,deny,status:403,log,msg:'CSM VP: Blocked PHP in wp-content/upgrade'"

# --- Generic: Block REST API user enumeration without auth ---
SecRule REQUEST_URI "/wp-json/wp/v2/users" \
    "id:900112,phase:1,deny,status:403,log,msg:'CSM VP: WordPress user enumeration blocked',\
    chain"
SecRule &REQUEST_HEADERS:Authorization "@eq 0"

# --- Generic: Block wp-login.php brute force ---
SecRule REQUEST_METHOD "POST" \
    "id:900113,phase:1,pass,nolog,chain"
SecRule REQUEST_URI "/wp-login\.php$" \
    "setvar:ip.wp_login_count=+1,expirevar:ip.wp_login_count=300"
SecRule IP:WP_LOGIN_COUNT "@gt 10" \
    "id:900114,phase:1,deny,status:429,log,msg:'CSM VP: wp-login brute force rate limit',\
    chain"
SecRule REQUEST_URI "/wp-login\.php$"

# --- Generic: Block .env file access ---
SecRule REQUEST_URI "/\.env" \
    "id:900115,phase:1,deny,status:403,log,msg:'CSM VP: Blocked .env file access'"

# --- Generic: Block common scanner/exploit probes ---
SecRule REQUEST_URI "(?:/\.git/|/\.svn/|/\.hg/|/vendor/phpunit/|/debug/default/|/telescope/)" \
    "id:900116,phase:1,deny,status:403,log,msg:'CSM VP: Blocked scanner probe'"
