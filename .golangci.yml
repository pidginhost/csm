version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - misspell
    - bodyclose
    - nilerr

  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintln
        - fmt.Fprintf
        - fmt.Printf
        - fmt.Sscanf
        - (io.Closer).Close
        - (*os.File).Close
        - os.Setenv
        - os.Remove
        - os.RemoveAll
        - (*os/exec.Cmd).Run
        - (*encoding/json).Unmarshal
    govet:
      enable-all: true
      disable:
        - fieldalignment

formatters:
  enable:
    - gofmt
    - goimports

formatters-settings:
  goimports:
    local-prefixes: github.com/pidginhost/cpanel-security-monitor

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
