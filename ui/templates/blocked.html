{{define "title"}}Blocked IPs{{end}}
{{define "page"}}blocked{{end}}
{{define "content"}}
    <!-- Block IP form -->
    <div class="card mb-3">
        <div class="card-header"><h3 class="card-title"><i class="ti ti-shield-plus"></i>&nbsp;Block IP</h3></div>
        <div class="card-body">
            <form id="block-form" class="row g-2 align-items-end">
                <div class="col-auto">
                    <input type="text" id="block-ip" class="form-control form-control-sm font-monospace" placeholder="IP address" style="width:180px">
                </div>
                <div class="col">
                    <input type="text" id="block-reason" class="form-control form-control-sm" placeholder="Reason (optional)">
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-danger btn-sm"><i class="ti ti-shield-off"></i>&nbsp;Block</button>
                </div>
            </form>
            <div id="block-status" class="mt-2 small"></div>
        </div>
    </div>

    <!-- Blocked list -->
    <div class="card">
        <div class="card-header">
            <h3 class="card-title"><i class="ti ti-shield-off"></i>&nbsp;Currently Blocked</h3>
            <div class="card-actions">
                <input type="text" id="blocked-search" class="form-control form-control-sm" placeholder="Search..." style="width:200px">
            </div>
        </div>
        <div id="blocked-content">
            <div class="card-body text-center text-muted py-4"><span class="spinner-border spinner-border-sm"></span> Loading...</div>
        </div>
    </div>
{{end}}
{{define "scripts"}}
<script>
function loadBlocked() {
    fetch('/api/v1/blocked-ips', {credentials:'same-origin'}).then(function(r){return r.json()}).then(function(ips){
        var el = document.getElementById('blocked-content');
        if (!ips || ips.length === 0) { el.innerHTML = '<div class="card-body text-center text-muted py-4"><i class="ti ti-circle-check"></i> No blocked IPs.</div>'; return; }
        var html = '<div class="table-responsive"><table class="table table-vcenter card-table" id="blocked-table"><thead><tr><th>IP</th><th>Reason</th><th>Blocked</th><th>Expires</th><th>Action</th></tr></thead><tbody>';
        for (var i = 0; i < ips.length; i++) {
            var ip = ips[i];
            html += '<tr><td><code>'+esc(ip.ip)+'</code></td><td class="small">'+esc(ip.reason)+'</td><td class="text-nowrap small text-muted">'+esc(ip.blocked_at)+'</td><td>'+esc(ip.expires_in)+'</td><td><button onclick="unblockIP(\''+esc(ip.ip)+'\')" class="btn btn-sm btn-success">Unblock</button></td></tr>';
        }
        html += '</tbody></table></div>';
        el.innerHTML = html;
        new CSM.Table({ tableId: 'blocked-table', perPage: 25, searchId: 'blocked-search', sortable: true });
    }).catch(function(){ document.getElementById('blocked-content').innerHTML = '<div class="card-body text-center text-danger py-4">Error loading data.</div>'; });
}
function unblockIP(ip) {
    if (!confirm('Unblock ' + ip + '?')) return;
    CSM.post('/api/v1/unblock-ip', {ip: ip}).then(function(data){
        showStatus(data.error || 'Unblocked: ' + ip, !data.error); loadBlocked();
    }).catch(function(e){ showStatus('Error: ' + e, false); });
}
document.getElementById('block-form').addEventListener('submit', function(e) {
    e.preventDefault();
    var ip = document.getElementById('block-ip').value.trim();
    var reason = document.getElementById('block-reason').value.trim() || 'Blocked via CSM Web UI';
    if (!ip) return;
    if (!confirm('Block IP ' + ip + '?')) return;
    CSM.post('/api/v1/block-ip', {ip: ip, reason: reason}).then(function(data){
        showStatus(data.error || 'Blocked: ' + ip, !data.error);
        document.getElementById('block-ip').value = ''; document.getElementById('block-reason').value = '';
        loadBlocked();
    }).catch(function(e){ showStatus('Error: ' + e, false); });
});
function showStatus(msg, ok) {
    var el = document.getElementById('block-status');
    el.textContent = msg; el.className = 'mt-2 small ' + (ok ? 'text-success' : 'text-danger');
    setTimeout(function(){ el.textContent = ''; }, 5000);
}
function esc(s){var d=document.createElement('div');d.appendChild(document.createTextNode(s||''));return d.innerHTML;}
loadBlocked();
</script>
{{end}}
{{template "layout" .}}
