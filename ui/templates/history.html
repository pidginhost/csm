{{define "title"}}History{{end}}
{{define "page"}}history{{end}}
{{define "content"}}
    <div class="card">
        <div class="card-header">
            <h3 class="card-title"><i class="ti ti-history"></i>&nbsp;Finding History <span class="text-muted ms-2" id="history-count"></span></h3>
            <div class="card-actions d-flex gap-2 flex-wrap align-items-center">
                <input type="text" id="history-search" class="form-control form-control-sm" placeholder="Search..." style="width:160px">
                <select id="sev-filter" class="form-select form-select-sm" style="width:auto">
                    <option value="all">All Severities</option>
                    <option value="2">Critical</option>
                    <option value="1">High</option>
                    <option value="0">Warning</option>
                </select>
                <div class="d-flex gap-1 align-items-center">
                    <input type="date" id="date-from" class="form-control form-control-sm" style="width:140px" title="From date">
                    <span class="text-muted small">to</span>
                    <input type="date" id="date-to" class="form-control form-control-sm" style="width:140px" title="To date">
                    <button type="button" class="btn btn-primary btn-sm" id="date-filter-btn"><i class="ti ti-filter"></i></button>
                    <button type="button" class="btn btn-ghost-secondary btn-sm d-none" id="date-clear-btn" title="Clear filter"><i class="ti ti-x"></i></button>
                </div>
                <a href="/api/v1/history/csv" class="btn btn-ghost-secondary btn-sm"><i class="ti ti-download"></i>&nbsp;CSV</a>
            </div>
        </div>
        <div id="history-content">
            <div class="card-body text-center text-muted py-4">Loading...</div>
        </div>
        <div class="card-footer d-flex justify-content-between align-items-center" id="history-pager"></div>
    </div>
{{end}}
{{define "scripts"}}
<script src="/static/js/history.js"></script>
{{end}}
{{template "layout" .}}
