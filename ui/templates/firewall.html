{{define "title"}}Firewall{{end}}
{{define "page"}}firewall{{end}}
{{define "content"}}
    <!-- Status Cards -->
    <div class="row row-deck row-cards mb-3" id="fw-status">
        <div class="col-sm-6 col-lg-3"><div class="card"><div class="card-body"><div class="d-flex align-items-center"><div class="subheader">Status</div></div><div class="h1 mb-0" id="fw-enabled">—</div></div></div></div>
        <div class="col-sm-6 col-lg-3"><div class="card"><div class="card-body"><div class="subheader">Blocked IPs</div><div class="h1 mb-0" id="fw-blocked">—</div></div></div></div>
        <div class="col-sm-6 col-lg-3"><div class="card"><div class="card-body"><div class="subheader">Blocked Subnets</div><div class="h1 mb-0" id="fw-subnets">—</div></div></div></div>
        <div class="col-sm-6 col-lg-3"><div class="card"><div class="card-body"><div class="subheader">Allowed IPs</div><div class="h1 mb-0" id="fw-allowed">—</div></div></div></div>
    </div>

    <!-- Config Summary -->
    <div class="card mb-3">
        <div class="card-header"><h3 class="card-title"><i class="ti ti-settings"></i>&nbsp;Configuration</h3></div>
        <div class="card-body">
            <div class="row" id="fw-config">
                <div class="col-md-6"><table class="table table-sm" id="fw-config-table"></table></div>
                <div class="col-md-6"><table class="table table-sm" id="fw-config-table2"></table></div>
            </div>
        </div>
    </div>

    <!-- Blocked Subnets -->
    <div class="card mb-3">
        <div class="card-header">
            <h3 class="card-title"><i class="ti ti-network"></i>&nbsp;Blocked Subnets</h3>
            <div class="card-actions">
                <form id="subnet-form" class="d-flex gap-2">
                    <input type="text" id="subnet-cidr" class="form-control form-control-sm font-monospace" placeholder="1.2.3.0/24" style="width:160px">
                    <input type="text" id="subnet-reason" class="form-control form-control-sm" placeholder="Reason" style="width:180px">
                    <button type="submit" class="btn btn-danger btn-sm text-nowrap"><i class="ti ti-shield-off"></i>&nbsp;Block</button>
                </form>
            </div>
        </div>
        <div id="subnet-content"><div class="card-body text-center text-muted py-3"><span class="spinner-border spinner-border-sm"></span></div></div>
    </div>

    <!-- Blocked IPs -->
    <div class="card mb-3">
        <div class="card-header">
            <h3 class="card-title"><i class="ti ti-shield-off"></i>&nbsp;Blocked IPs</h3>
            <div class="card-actions d-flex gap-2 flex-wrap">
                <button class="btn btn-success btn-sm d-none" id="bulk-unblock-btn" onclick="bulkUnblock()">Unblock 0 IPs</button>
                <input type="text" id="blocked-search" class="form-control form-control-sm" placeholder="Search IPs..." style="width:180px">
                <form id="block-form" class="d-flex gap-2">
                    <input type="text" id="block-ip" class="form-control form-control-sm font-monospace" placeholder="IP address" style="width:160px">
                    <input type="text" id="block-reason" class="form-control form-control-sm" placeholder="Reason" style="width:180px">
                    <button type="submit" class="btn btn-danger btn-sm text-nowrap"><i class="ti ti-shield-off"></i>&nbsp;Block</button>
                </form>
            </div>
        </div>
        <div id="blocked-content"><div class="card-body text-center text-muted py-3"><span class="spinner-border spinner-border-sm"></span></div></div>
    </div>

    <!-- Audit Log -->
    <div class="card">
        <div class="card-header"><h3 class="card-title"><i class="ti ti-history"></i>&nbsp;Audit Log</h3></div>
        <div id="audit-content"><div class="card-body text-center text-muted py-3"><span class="spinner-border spinner-border-sm"></span></div></div>
    </div>
{{end}}
{{define "scripts"}}
<script src="/static/js/firewall.js"></script>
{{end}}
{{template "layout" .}}
