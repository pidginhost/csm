{{define "title"}}Quarantine{{end}}
{{define "page"}}quarantine{{end}}
{{define "content"}}
    <div class="card">
        <div class="card-header">
            <h3 class="card-title"><i class="ti ti-lock"></i>&nbsp;Quarantined Files</h3>
            <div class="card-actions">
                <input type="text" id="quarantine-search" class="form-control form-control-sm" placeholder="Search..." style="width:200px">
            </div>
        </div>
        <div id="quarantine-content">
            <div class="card-body text-center text-muted py-4"><span class="spinner-border spinner-border-sm"></span> Loading...</div>
        </div>
    </div>
{{end}}
{{define "scripts"}}
<script>
function loadQuarantine() {
    fetch('/api/v1/quarantine', {credentials:'same-origin'}).then(function(r){return r.json()}).then(function(files){
        var el = document.getElementById('quarantine-content');
        if (!files || files.length === 0) { el.innerHTML = '<div class="card-body text-center text-muted py-4"><i class="ti ti-circle-check"></i> No quarantined files.</div>'; return; }
        var html = '<div class="table-responsive"><table class="table table-vcenter card-table" id="quarantine-table"><thead><tr><th>Original Path</th><th>Size</th><th>Quarantined</th><th>Reason</th><th>Action</th></tr></thead><tbody>';
        for (var i = 0; i < files.length; i++) {
            var f = files[i];
            html += '<tr><td><code>'+esc(f.original_path)+'</code></td><td>'+formatSize(f.size)+'</td><td class="text-nowrap"><span class="text-muted small">'+esc(f.quarantined_at)+'</span></td><td class="small">'+esc(f.reason)+'</td><td><button onclick="restoreFile(\''+esc(f.id)+'\')" class="btn btn-sm btn-warning">Restore</button></td></tr>';
        }
        html += '</tbody></table></div>';
        el.innerHTML = html;
        // Initialize table component after DOM is ready
        new CSM.Table({ tableId: 'quarantine-table', perPage: 25, searchId: 'quarantine-search', sortable: true });
    }).catch(function(){ document.getElementById('quarantine-content').innerHTML = '<div class="card-body text-center text-danger py-4">Error loading data.</div>'; });
}
function restoreFile(id) {
    if (!confirm('Restore this file? A re-scan is recommended after restore.')) return;
    CSM.post('/api/v1/quarantine-restore', {id: id}).then(function(data){
        if (data.error) alert('Error: ' + data.error); else alert('Restored: ' + data.path);
        loadQuarantine();
    }).catch(function(e){ alert('Error: ' + e); });
}
function esc(s){var d=document.createElement('div');d.appendChild(document.createTextNode(s||''));return d.innerHTML;}
function formatSize(b){if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB';}
loadQuarantine();
</script>
{{end}}
{{template "layout" .}}
