{{define "title"}}Quarantine{{end}}
{{define "page"}}quarantine{{end}}
{{define "content"}}
    <div class="csm-page-header mb-3">
        <div class="csm-page-header__main">
            <h1 class="csm-page-header__title"><i class="ti ti-lock"></i>&nbsp;Quarantine</h1>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h3 class="card-title"><i class="ti ti-lock"></i>&nbsp;Quarantined Files</h3>
        </div>
        <div class="csm-toolbar">
            <input type="text" id="quarantine-search" class="form-control form-control-sm csm-toolbar__search" placeholder="Search quarantine..." aria-label="Search quarantine">
            <select id="quarantine-account-filter" class="form-select form-select-sm csm-toolbar__filter" aria-label="Filter by account">
                <option value="">All accounts</option>
            </select>
            <select id="quarantine-source-filter" class="form-select form-select-sm csm-toolbar__filter" aria-label="Filter by detector">
                <option value="">All detectors</option>
            </select>
            <input type="date" id="quarantine-from" class="form-control form-control-sm csm-toolbar__filter" aria-label="From date">
            <input type="date" id="quarantine-to" class="form-control form-control-sm csm-toolbar__filter" aria-label="To date">
            <span class="csm-toolbar__spacer"></span>
            <div class="csm-toolbar__actions">
                <button class="btn btn-warning btn-sm d-none" id="bulk-restore-btn"><i class="ti ti-restore"></i>&nbsp;Restore Selected</button>
                <button class="btn btn-danger btn-sm d-none" id="bulk-delete-btn"><i class="ti ti-trash"></i>&nbsp;Delete Selected</button>
            </div>
        </div>
        <div id="quarantine-content">
            <div class="card-body text-center text-muted py-4"><span class="spinner-border spinner-border-sm"></span> Loading...</div>
        </div>
    </div>
{{end}}
{{define "scripts"}}
<script src="/static/js/quarantine.js"></script>
{{end}}
{{template "layout" .}}
