{{define "title"}}Audit Log{{end}}
{{define "page"}}audit{{end}}

    <div class="card">
        <div class="card-header">
            <h3 class="card-title"><i class="ti ti-clipboard-list"></i>&nbsp;Audit Log</h3>
            <div class="card-actions">
                <input type="text" id="audit-search" class="form-control form-control-sm" placeholder="Search..." style="width:160px">

        </div>
    </div>

{{define "scripts"}}
<script src="/static/js/audit.js"></script>
{{end}}
{{template "layout" .}}
