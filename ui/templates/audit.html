{{define "title"}}Audit Log{{end}}
{{define "page"}}audit{{end}}
{{define "content"}}
    <div class="csm-page-header mb-3">
        <div class="csm-page-header__main">
            <h1 class="csm-page-header__title"><i class="ti ti-clipboard-list"></i>&nbsp;Audit Log</h1>
        </div>
    </div>

    <div class="card">
        <div class="csm-toolbar">
            <input type="text" id="audit-search" class="form-control form-control-sm csm-toolbar__search" placeholder="Search audit log..." aria-label="Search audit log">
            <select id="audit-action-filter" class="form-select form-select-sm csm-toolbar__filter" aria-label="Filter by action type">
                <option value="">All actions</option>
                <option value="block_ip">Block IP</option>
                <option value="unblock_ip">Unblock IP</option>
                <option value="whitelist_ip">Whitelist IP</option>
                <option value="temp_whitelist_ip">Temp whitelist</option>
                <option value="clear_ip">Clear IP</option>
                <option value="dismiss">Dismiss</option>
                <option value="fix">Fix</option>
                <option value="restore">Restore</option>
            </select>
            <input type="date" id="audit-from" class="form-control form-control-sm csm-toolbar__filter" aria-label="From date">
            <input type="date" id="audit-to" class="form-control form-control-sm csm-toolbar__filter" aria-label="To date">
            <span class="csm-toolbar__spacer"></span>
            <div class="dropdown csm-toolbar__actions">
                <button class="btn btn-ghost-secondary btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-label="Export current view" title="Export current view">
                    <i class="ti ti-download"></i>&nbsp;Export
                </button>
                <div class="dropdown-menu dropdown-menu-end">
                    <a class="dropdown-item" href="#" data-export="csv"><i class="ti ti-file-spreadsheet me-2"></i>CSV</a>
                    <a class="dropdown-item" href="#" data-export="json"><i class="ti ti-braces me-2"></i>JSON</a>
                </div>
            </div>
        </div>
        <div id="audit-content">
            <div class="card-body text-center text-muted py-4"><span class="spinner-border spinner-border-sm"></span> Loading...</div>
        </div>
    </div>
{{end}}
{{define "scripts"}}
<script src="/static/js/audit.js"></script>
{{end}}
{{template "layout" .}}
