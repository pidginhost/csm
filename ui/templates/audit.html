{{define "title"}}Audit Log{{end}}
{{define "page"}}audit{{end}}
{{define "content"}}
    <div class="page-header mb-3">
        <div class="row align-items-center">
            <div class="col-auto"><h2 class="page-title">Audit Log</h2></div>
        </div>
    </div>

    <div class="card">
        <div class="card-body border-bottom py-2">
            <div class="d-flex gap-2 flex-wrap align-items-center">
                <input type="text" id="audit-search" class="form-control form-control-sm csm-input-sm" placeholder="Search...">
                <button class="btn btn-ghost-secondary btn-sm ms-auto" id="audit-export-csv" title="Export as CSV"><i class="ti ti-download"></i>&nbsp;CSV</button>
            </div>
        </div>
        <div id="audit-content">
            <div class="card-body text-center text-muted py-4"><span class="spinner-border spinner-border-sm"></span> Loading...</div>
        </div>
    </div>
{{end}}
{{define "scripts"}}
<script src="/static/js/audit.js"></script>
{{end}}
{{template "layout" .}}
