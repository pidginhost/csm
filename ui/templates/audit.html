{{define "title"}}Audit Log{{end}}
{{define "page"}}audit{{end}}
{{define "content"}}
    <div class="csm-page-header mb-3">
        <div class="csm-page-header__main">
            <h1 class="csm-page-header__title"><i class="ti ti-clipboard-list"></i>&nbsp;Audit Log</h1>
        </div>
    </div>

    <div class="card">
        <div class="csm-toolbar">
            <input type="text" id="audit-search" class="form-control form-control-sm csm-toolbar__search" placeholder="Search audit log..." aria-label="Search audit log">
            <span class="csm-toolbar__spacer"></span>
            <button class="btn btn-ghost-secondary btn-sm" id="audit-export-csv" title="Export as CSV"><i class="ti ti-download"></i>&nbsp;CSV</button>
        </div>
        <div id="audit-content">
            <div class="card-body text-center text-muted py-4"><span class="spinner-border spinner-border-sm"></span> Loading...</div>
        </div>
    </div>
{{end}}
{{define "scripts"}}
<script src="/static/js/audit.js"></script>
{{end}}
{{template "layout" .}}
