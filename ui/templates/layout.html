{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CSM — {{template "title" .}}</title>
    <link rel="stylesheet" href="/static/css/tabler.min.css">
    <link rel="stylesheet" href="/static/css/tabler-icons.min.css">
    <meta name="csrf-token" content="{{csrfToken}}">
    <style>
        body { background-color: #1a2234; }
        .badge-critical { background: #d63939; color: #fff; }
        .badge-high { background: #f76707; color: #fff; }
        .badge-warning { background: #f59f00; color: #fff; }
        .text-critical { color: #d63939; }
        .text-high { color: #f76707; }
        .text-warning { color: #f59f00; }
        .details-row { display: none; }
        .details-row.show { display: table-row; }
        .timeline-bar:hover { opacity: 1 !important; }
        th.sort-asc::after { content: ' ▲'; opacity: 0.5; }
        th.sort-desc::after { content: ' ▼'; opacity: 0.5; }
        th[style*="cursor"] { user-select: none; }
    </style>
</head>
<body class="theme-dark">
    <div class="page">
        <header class="navbar navbar-expand-md d-print-none" data-bs-theme="dark">
            <div class="container-xl">
                <h1 class="navbar-brand navbar-brand-autodark d-none-navbar-btn">
                    <span class="text-primary">CSM</span>&nbsp;Security Monitor
                </h1>
                <div class="navbar-nav flex-row order-md-last">
                    <a href="/logout" class="btn btn-ghost-secondary btn-sm">
                        <i class="ti ti-logout"></i> Logout
                    </a>
                </div>
                <div class="collapse navbar-collapse" id="navbar-menu">
                    <ul class="navbar-nav">
                        <li class="nav-item"><a class="nav-link {{if eq (template "page" .) "dashboard"}}active{{end}}" href="/dashboard"><i class="ti ti-dashboard"></i>&nbsp;Dashboard</a></li>
                        <li class="nav-item"><a class="nav-link {{if eq (template "page" .) "findings"}}active{{end}}" href="/findings"><i class="ti ti-alert-triangle"></i>&nbsp;Findings</a></li>
                        <li class="nav-item"><a class="nav-link {{if eq (template "page" .) "history"}}active{{end}}" href="/history"><i class="ti ti-history"></i>&nbsp;History</a></li>
                        <li class="nav-item"><a class="nav-link {{if eq (template "page" .) "quarantine"}}active{{end}}" href="/quarantine"><i class="ti ti-lock"></i>&nbsp;Quarantine</a></li>
                        <li class="nav-item"><a class="nav-link {{if eq (template "page" .) "blocked"}}active{{end}}" href="/blocked"><i class="ti ti-shield-off"></i>&nbsp;Blocked IPs</a></li>
                    </ul>
                </div>
            </div>
        </header>
        <div class="page-wrapper">
            <div class="page-body">
                <div class="container-xl">
                    {{template "content" .}}
                </div>
            </div>
            <footer class="footer footer-transparent d-print-none">
                <div class="container-xl">
                    <div class="text-muted text-center">CSM — cPanel Security Monitor</div>
                </div>
            </footer>
        </div>
    </div>
    <script src="/static/js/tabler.min.js"></script>
    <script src="/static/js/csrf.js"></script>
    <script src="/static/js/table.js"></script>
    {{template "scripts" .}}
</body>
</html>
{{end}}
