{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CSM — {{template "title" .}}</title>
    <link rel="stylesheet" href="/static/css/tabler.min.css">
    <link rel="stylesheet" href="/static/css/tabler-icons.min.css">
    <meta name="csrf-token" content="{{csrfToken}}">
    <style>
        .theme-dark, .theme-dark body { background-color: #1a2234; color: #c8d3e0; }
        .theme-dark .card { background-color: #1e293b; border-color: #2d3a4e; color: #c8d3e0; }
        .theme-dark .card-header { border-color: #2d3a4e; }
        .theme-dark .card-footer { border-color: #2d3a4e; }
        .theme-dark .table { color: #c8d3e0; }
        .theme-dark .table thead th { background-color: #1a2234; border-color: #2d3a4e; }
        .theme-dark .table td { border-color: #2d3a4e; }
        .theme-dark .navbar { background-color: #1a2234 !important; border-color: #2d3a4e; }
        .theme-dark .footer { border-color: #2d3a4e; }
        .theme-dark .form-control, .theme-dark .form-select { background-color: #1a2234; border-color: #2d3a4e; color: #c8d3e0; }
        .theme-dark .list-group-item { background-color: #1e293b; border-color: #2d3a4e; color: #c8d3e0; }
        .theme-dark .text-muted { color: #6b7a8d !important; }
        .theme-dark .subheader { color: #6b7a8d; }
        .theme-dark code { color: #7ec8e3; }
        .badge-critical { background: #d63939; color: #fff; }
        .badge-high { background: #f76707; color: #fff; }
        .badge-warning { background: #f59f00; color: #fff; }
        .text-critical { color: #d63939; }
        .text-high { color: #f76707; }
        .text-warning { color: #f59f00; }
        .details-row { display: none; }
        .details-row.show { display: table-row; }
        .timeline-bar:hover { opacity: 1 !important; }
        th.sort-asc::after { content: ' ▲'; opacity: 0.5; }
        th.sort-desc::after { content: ' ▼'; opacity: 0.5; }
        th[style*="cursor"] { user-select: none; }
        .page { overflow-x: hidden; }
    </style>
    <script>
    var __theme = localStorage.getItem('csm-theme') || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    document.documentElement.setAttribute('data-bs-theme', __theme);
    document.documentElement.className = __theme === 'light' ? 'theme-light' : 'theme-dark';
    </script>
</head>
<body class="layout-fluid">
    <div class="page">
        <header class="navbar navbar-expand-md d-print-none" data-bs-theme="dark">
            <div class="container-xl">
                <h1 class="navbar-brand navbar-brand-autodark d-none-navbar-btn">
                    <span class="text-primary">CSM</span>&nbsp;Security Monitor
                </h1>
                <div class="navbar-nav flex-row order-md-last gap-2">
                    <button id="theme-toggle" class="btn btn-ghost-secondary btn-sm" onclick="toggleTheme()" title="Toggle dark/light mode">
                        <i class="ti ti-sun-moon"></i>
                    </button>
                    <a href="/logout" class="btn btn-ghost-secondary btn-sm">
                        <i class="ti ti-logout"></i> Logout
                    </a>
                </div>
                <div class="collapse navbar-collapse" id="navbar-menu">
                    <ul class="navbar-nav" id="csm-nav">
                        <li class="nav-item"><a class="nav-link" href="/dashboard"><i class="ti ti-dashboard"></i>&nbsp;Dashboard</a></li>
                        <li class="nav-item"><a class="nav-link" href="/findings"><i class="ti ti-alert-triangle"></i>&nbsp;Findings</a></li>
                        <li class="nav-item"><a class="nav-link" href="/history"><i class="ti ti-history"></i>&nbsp;History</a></li>
                        <li class="nav-item"><a class="nav-link" href="/quarantine"><i class="ti ti-lock"></i>&nbsp;Quarantine</a></li>
                        <li class="nav-item"><a class="nav-link" href="/blocked"><i class="ti ti-shield-off"></i>&nbsp;Blocked IPs</a></li>
                        <li class="nav-item"><a class="nav-link" href="/firewall"><i class="ti ti-firewall"></i>&nbsp;Firewall</a></li>
                    </ul>
                </div>
            </div>
        </header>
        <div class="page-wrapper">
            <div class="page-body">
                <div class="container-xl">
                    {{template "content" .}}
                </div>
            </div>
            <footer class="footer footer-transparent d-print-none">
                <div class="container-xl">
                    <div class="text-muted text-center">CSM — cPanel Security Monitor</div>
                </div>
            </footer>
        </div>
    </div>
    <script src="/static/js/tabler.min.js"></script>
    <script src="/static/js/csrf.js"></script>
    <script src="/static/js/table.js"></script>
    <script>
    document.querySelectorAll('#csm-nav a.nav-link').forEach(function(a){if(a.getAttribute('href')===window.location.pathname)a.classList.add('active')});
    function applyTheme(t) {
        document.documentElement.setAttribute('data-bs-theme', t);
        document.documentElement.classList.remove('theme-dark', 'theme-light');
        document.documentElement.classList.add(t === 'light' ? 'theme-light' : 'theme-dark');
        var icon = document.querySelector('#theme-toggle i');
        if (icon) icon.className = t === 'light' ? 'ti ti-moon' : 'ti ti-sun';
    }
    function toggleTheme() {
        var current = document.documentElement.getAttribute('data-bs-theme') || 'dark';
        var next = current === 'dark' ? 'light' : 'dark';
        applyTheme(next);
        localStorage.setItem('csm-theme', next);
    }
    applyTheme(__theme);
    </script>
    {{template "scripts" .}}
</body>
</html>
{{end}}
