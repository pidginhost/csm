{{define "title"}}Account — {{.AccountName}}{{end}}
{{define "page"}}account{{end}}
{{define "content"}}
<div class="csm-page-header mb-3">
    <div class="csm-page-header__main">
        <h1 class="csm-page-header__title"><i class="ti ti-user"></i>&nbsp;Account: <code>{{.AccountName}}</code></h1>
        <div class="csm-page-header__subtitle"><span class="text-muted font-monospace">{{.HomeDir}}</span></div>
    </div>
</div>

<ul class="nav nav-tabs mb-3" id="account-tabs" role="tablist">
    <li class="nav-item" role="presentation">
        <button class="nav-link active" data-tab="findings" role="tab" aria-selected="true">Findings</button>
    </li>
    <li class="nav-item" role="presentation">
        <button class="nav-link" data-tab="quarantine" role="tab" aria-selected="false">Quarantine</button>
    </li>
    <li class="nav-item" role="presentation">
        <button class="nav-link" data-tab="history" role="tab" aria-selected="false">History</button>
    </li>
</ul>

<div id="account-tab-content">
    <div class="card-body text-center text-muted py-4">
        <span class="spinner-border spinner-border-sm"></span> Loading...
    </div>
</div>
{{end}}
{{define "scripts"}}<script src="/static/js/account.js"></script>{{end}}
{{template "layout" .}}
