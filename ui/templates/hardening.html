{{define "title"}}Server Hardening{{end}}
{{define "page"}}hardening{{end}}
{{define "content"}}
    <div class="csm-page-header d-print-none mb-3">
        <div class="csm-page-header__main">
            <h1 class="csm-page-header__title"><i class="ti ti-shield-lock"></i>&nbsp;Server Hardening Audit</h1>
            <div class="csm-page-header__subtitle" id="audit-timestamp"></div>
        </div>
        <div class="csm-page-header__actions">
            <div class="btn-group">
                <button type="button" class="btn btn-ghost-secondary btn-sm dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Export hardening audit">
                    <i class="ti ti-download"></i>&nbsp;Export
                </button>
                <div class="dropdown-menu dropdown-menu-end">
                    <a class="dropdown-item" href="#" data-export="csv">CSV</a>
                    <a class="dropdown-item" href="#" data-export="json">JSON</a>
                </div>
            </div>
            <button class="btn btn-primary btn-sm" id="btn-run-audit">
                <i class="ti ti-player-play"></i>&nbsp;Run Audit
            </button>
        </div>
    </div>
    <div class="card mb-3 d-none" id="score-card">
        <div class="card-body">
            <div class="d-flex align-items-center mb-2">
                <h3 class="mb-0" id="score-text"></h3>
                <span class="ms-2 text-muted" id="score-server-type"></span>
            </div>
            <div class="progress progress-lg">
                <div class="progress-bar csm-progress-zero" id="score-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100"></div>
            </div>
        </div>
    </div>
    <div class="card" id="empty-state">
        <div class="csm-empty">
            <div class="csm-empty__icon"><i class="ti ti-shield-lock"></i></div>
            <div class="csm-empty__title">No audit results yet</div>
            <div class="csm-empty__reason">Click "Run Audit" to scan your server's security configuration.</div>
        </div>
    </div>
    <div id="categories-container"></div>
{{end}}
{{define "scripts"}}
    <script src="/static/js/hardening.js"></script>
{{end}}
{{template "layout" .}}
