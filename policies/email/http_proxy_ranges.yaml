# CIDRs that should be skipped by Path 4 (HTTP-IP fanout) because they
# represent CDN/proxy front IPs rather than real client IPs. PHP sees the
# CDN IP via REMOTE_ADDR; correlating fanout against it would produce
# massive false positives on multi-tenant sites behind CF/Sucuri.
#
# Operators with a different CDN should add CIDRs here; the daemon
# hot-reloads on SIGHUP.

